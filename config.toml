[solution]
# 你的方案名称，可以自定义
name = "my-dsa-baseline-v1"

# 核心：必须完全匹配之前 python 命令输出的那个超长字符串
# 对应 DeepSeek Sparse Attention 赛道
definition = "dsa_sparse_attention_h16_ckv512_kpe64_topk2048_ps64"

# 你的团队或个人名称
author = "your-team-name"

[build]
# 使用 Triton 语言
language = "triton"

# 核心修复：路径必须相对于 solution/triton 文件夹
# 格式为 "<文件名>::<入口函数名>"
entry_point = "kernel.py::sparse_attention_kernel"